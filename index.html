<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Frag' Libby – Agenda Austria Chatbot</title>
<style>
* { box-sizing:border-box; }
html { height:100%; }
body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f5f5f5; height:100%; overflow:hidden; }
.container { max-width:700px; margin:0 auto; background:white; height:100%; display:flex; flex-direction:column; }
h1 { color:#0066cc; margin:0; padding:20px 20px 5px 20px; font-size:32px; font-weight:bold; flex-shrink:0; line-height:1.2; text-align:center; }
.subtitle { color:#0066cc; font-size:13px; font-weight:normal; padding:0 20px 15px 20px; border-bottom:1px solid #eee; margin:0; flex-shrink:0; text-align:center; font-style:italic; }
#chat { flex:1; padding:15px; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:100px; }
.msg-wrapper { margin:15px 0; display:flex; flex-direction:column; }
.msg-wrapper.bot { align-items:flex-start; }
.msg-wrapper.user { align-items:flex-end; }
.msg { padding:10px 14px; border-radius:18px; max-width:75%; word-wrap:break-word; font-size:15px; line-height:1.4; }
.msg.bot { background:#e9e9eb; color:#000; border-radius:18px 18px 18px 4px; }
.msg.user { background:#0066cc; color:white; border-radius:18px 18px 4px 18px; }
.feedback-container { margin-top:8px; font-size:13px; color:#666; display:flex; align-items:center; gap:6px; align-self:flex-start; }
.feedback-container button { background:transparent; border:none; width:28px; height:28px; font-size:18px; cursor:pointer; transition:all 0.2s; border-radius:50%; padding:0; }
.feedback-container button:hover { transform:scale(1.15); background:#f5f5f5; }
.feedback-container button.active-good { background:#22c55e; transform:scale(1.1); }
.feedback-container button.active-bad { background:#ef4444; transform:scale(1.1); }
.feedback-container button:disabled { opacity:0.3; cursor:not-allowed; }
.typing-wrapper { display:flex; flex-direction:column; align-items:flex-start; }
.typing { padding:10px 14px; background:#e9e9eb; border-radius:18px; display:inline-block; }
.typing span { width:8px; height:8px; background:#999; border-radius:50%; display:inline-block; margin:0 3px; animation:bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%, 80%, 100% { opacity:0.3; } 40% { opacity:1; } }
.form-wrapper { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #eee; padding:15px; padding-bottom:max(15px, env(safe-area-inset-bottom)); z-index:1000; }
.form-wrapper form { display:flex; gap:8px; max-width:700px; margin:0 auto; }
input { flex:1; padding:12px 16px; border:1px solid #ddd; border-radius:24px; font-size:16px; outline:none; -webkit-appearance:none; }
input:focus { border-color:#0066cc; }
button[type="submit"] { padding:12px 24px; background:#0066cc; color:white; border:none; border-radius:24px; font-weight:bold; font-size:16px; cursor:pointer; -webkit-appearance:none; white-space:nowrap; flex-shrink:0; }
button[type="submit"]:active { background:#0052a3; }
button[type="submit"]:disabled { opacity:0.5; }

@media (max-width:600px) {
  h1 { font-size:28px; padding:15px 15px 5px 15px; }
  .subtitle { font-size:11px; padding:0 15px 12px 15px; }
  .msg { font-size:14px; max-width:85%; }
  .feedback-container { font-size:12px; }
  .form-wrapper { padding:10px; padding-bottom:max(10px, env(safe-area-inset-bottom)); }
  input { padding:10px 14px; font-size:16px; }
  button[type="submit"] { padding:10px 20px; font-size:15px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>🧿 Frag' Libby 💙</h1>
  <p class="subtitle">(Warnung: Ich bin unabhängig, aber nicht neutral!)</p>
  <div id="chat"></div>
</div>
<div class="form-wrapper">
  <form onsubmit="send(event)">
    <input type="text" id="msg" placeholder="Deine Frage..." autocomplete="off" autofocus required>
    <button type="submit" id="btn">Senden</button>
  </form>
</div>
<script>
const chat=document.getElementById('chat'),msg=document.getElementById('msg'),btn=document.getElementById('btn'),sessionId='user_'+Date.now();

function add(text,isUser,conversationId){
  const wrapper=document.createElement('div');
  wrapper.className='msg-wrapper '+(isUser?'user':'bot');
  
  const p=document.createElement('div');
  p.className='msg '+(isUser?'user':'bot');
  p.textContent=text;
  wrapper.appendChild(p);
  
  if(!isUser&&conversationId){
    const feedbackContainer=document.createElement('div');
    feedbackContainer.className='feedback-container';
    feedbackContainer.innerHTML=`Antwort ist: <button onclick="giveFeedback(${conversationId},1,this)" title="Gute Antwort">👍</button> <button onclick="giveFeedback(${conversationId},-1,this)" title="Schlechte Antwort">👎</button>`;
    wrapper.appendChild(feedbackContainer);
  }
  
  chat.appendChild(wrapper);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const wrapper=document.createElement('div');
  wrapper.id='typing-indicator';
  wrapper.className='typing-wrapper';
  wrapper.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(wrapper);
  chat.scrollTop=chat.scrollHeight;
}

async function send(e){
  e.preventDefault();
  const text=msg.value.trim();
  if(!text)return;
  
  add(text,true);
  msg.value='';
  btn.disabled=true;
  showTyping();
  
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,sessionId})
    });
    const data=await res.json();
    document.getElementById('typing-indicator')?.remove();
    add(data.message,false,data.conversationId);
  }catch(err){
    document.getElementById('typing-indicator')?.remove();
    add('Fehler beim Laden der Antwort.',false);
  }
  
  btn.disabled=false;
  msg.focus();
}

async function giveFeedback(conversationId,feedback,button){
  await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversationId,feedback})});
  button.classList.add(feedback>0?'active-good':'active-bad');
  button.parentElement.querySelectorAll('button').forEach(b=>{if(b!==button)b.disabled=true});
}

// Scroll to bottom when keyboard opens
window.visualViewport?.addEventListener('resize', () => {
  chat.scrollTop = chat.scrollHeight;
});

add('Hi! Worüber möchtest du sprechen?',false);
</script>
</body>
</html>
