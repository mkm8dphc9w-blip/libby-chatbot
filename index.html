<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Frag' Libby – Agenda Austria Chatbot</title>
<style>
* { box-sizing:border-box; }
body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f5f5f5; height:100vh; overflow:hidden; }
.container { max-width:700px; margin:0 auto; background:white; height:100vh; display:flex; flex-direction:column; }
h1 { color:#0066cc; margin:0; padding:15px 20px 8px 20px; font-size:22px; border-bottom:1px solid #eee; flex-shrink:0; }
.subtitle { color:#666; font-size:13px; padding:0 20px 12px 20px; border-bottom:1px solid #eee; font-style:italic; margin:0; flex-shrink:0; }
#chat { flex:1; padding:15px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.msg-wrapper { margin:15px 0; clear:both; }
.msg-wrapper.user { text-align:right; }
.msg { padding:10px 14px; border-radius:18px; display:inline-block; max-width:85%; word-wrap:break-word; font-size:15px; line-height:1.4; }
.bot { background:#f0f0f0; color:#333; border-radius:18px 18px 18px 4px; }
.user { background:#0066cc; color:white; border-radius:18px 18px 4px 18px; }
.feedback-label { font-size:11px; color:#999; margin-top:6px; margin-bottom:2px; }
.feedback { margin-top:4px; display:inline-flex; gap:8px; background:white; padding:6px 10px; border-radius:20px; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
.feedback button { background:transparent; border:none; width:32px; height:32px; font-size:20px; cursor:pointer; transition:all 0.2s; border-radius:50%; }
.feedback button:hover { transform:scale(1.2); background:#f5f5f5; }
.feedback button.active-good { background:#22c55e; transform:scale(1.15); }
.feedback button.active-bad { background:#ef4444; transform:scale(1.15); }
.feedback button:disabled { opacity:0.3; cursor:not-allowed; }
.typing { padding:10px 14px; background:#f0f0f0; border-radius:18px; display:inline-block; }
.typing span { width:8px; height:8px; background:#999; border-radius:50%; display:inline-block; margin:0 3px; animation:bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%, 80%, 100% { opacity:0.3; } 40% { opacity:1; } }
form { padding:15px; border-top:1px solid #eee; display:flex; gap:8px; background:white; flex-shrink:0; }
input { flex:1; padding:12px 16px; border:1px solid #ddd; border-radius:24px; font-size:16px; outline:none; -webkit-appearance:none; }
input:focus { border-color:#0066cc; }
button { padding:12px 24px; background:#0066cc; color:white; border:none; border-radius:24px; font-weight:bold; font-size:16px; cursor:pointer; -webkit-appearance:none; white-space:nowrap; }
button:active { background:#0052a3; }
button:disabled { opacity:0.5; }

@media (max-width:600px) {
  h1 { font-size:20px; padding:12px 15px 6px 15px; }
  .subtitle { font-size:12px; padding:0 15px 10px 15px; }
  .msg { font-size:14px; max-width:90%; }
  form { padding:10px; gap:6px; }
  input { padding:10px 14px; font-size:16px; }
  button { padding:10px 20px; font-size:15px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Frag' Libby</h1>
  <p class="subtitle">Unabhängig aber nicht neutral</p>
  <div id="chat"></div>
  <form onsubmit="send(event)">
    <input type="text" id="msg" placeholder="Deine Frage..." autocomplete="off" autofocus required>
    <button type="submit" id="btn">Senden</button>
  </form>
</div>
<script>
const chat=document.getElementById('chat'),msg=document.getElementById('msg'),btn=document.getElementById('btn'),sessionId='user_'+Date.now();

function add(text,isUser,conversationId){
  const wrapper=document.createElement('div');
  wrapper.className='msg-wrapper'+(isUser?' user':'');
  const p=document.createElement('div');
  p.className='msg '+(isUser?'user':'bot');
  p.textContent=text;
  wrapper.appendChild(p);
  
  if(!isUser&&conversationId){
    const label=document.createElement('div');
    label.className='feedback-label';
    label.textContent='Antwort:';
    wrapper.appendChild(label);
    
    const feedback=document.createElement('div');
    feedback.className='feedback';
    feedback.innerHTML=`<button onclick="giveFeedback(${conversationId},1,this)" title="Gute Antwort">👍</button><button onclick="giveFeedback(${conversationId},-1,this)" title="Schlechte Antwort">👎</button>`;
    wrapper.appendChild(feedback);
  }
  
  chat.appendChild(wrapper);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const wrapper=document.createElement('div');
  wrapper.id='typing-indicator';
  wrapper.className='msg-wrapper';
  wrapper.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(wrapper);
  chat.scrollTop=chat.scrollHeight;
}

async function send(e){
  e.preventDefault();
  const text=msg.value.trim();
  if(!text)return;
  
  add(text,true);
  msg.value='';
  btn.disabled=true;
  showTyping();
  
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,sessionId})
    });
    const data=await res.json();
    document.getElementById('typing-indicator')?.remove();
    add(data.message,false,data.conversationId);
  }catch(err){
    document.getElementById('typing-indicator')?.remove();
    add('Fehler beim Laden der Antwort.',false);
  }
  
  btn.disabled=false;
  msg.focus();
}

async function giveFeedback(conversationId,feedback,button){
  await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversationId,feedback})});
  button.classList.add(feedback>0?'active-good':'active-bad');
  button.parentElement.querySelectorAll('button').forEach(b=>{if(b!==button)b.disabled=true});
}

add('Hi! Worüber möchtest du sprechen?',false);
</script>
</body>
</html>
