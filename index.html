<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Libby – Agenda Austria Chatbot</title>
<style>
body { margin:0; padding:20px; font-family:-apple-system,sans-serif; background:#f5f5f5; }
.container { max-width:700px; margin:0 auto; background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
h1 { color:#e20613; margin:0 0 20px 0; font-size:28px; }
#chat { padding:15px; min-height:400px; margin-bottom:20px; overflow-y:auto; }
.msg-wrapper { margin:20px 0; }
.msg-wrapper.user { text-align:right; }
.msg { padding:12px 16px; border-radius:18px; display:inline-block; max-width:80%; }
.bot { background:#f0f0f0; border-radius:18px 18px 18px 4px; }
.user { background:#e20613; color:white; border-radius:18px 18px 4px 18px; }
.feedback { margin-top:8px; display:inline-flex; gap:8px; background:white; padding:6px 10px; border-radius:20px; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
.feedback button { background:transparent; border:none; width:32px; height:32px; font-size:20px; cursor:pointer; transition:all 0.2s; border-radius:50%; }
.feedback button:hover { transform:scale(1.2); background:#f5f5f5; }
.feedback button.active-good { background:#22c55e; transform:scale(1.15); }
.feedback button.active-bad { background:#ef4444; transform:scale(1.15); }
.feedback button:disabled { opacity:0.3; cursor:not-allowed; }
.typing span { width:8px; height:8px; background:#999; border-radius:50%; display:inline-block; margin:0 3px; animation:bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%, 80%, 100% { opacity:0.3; } 40% { opacity:1; } }
form { display:flex; gap:10px; }
input { flex:1; padding:12px 16px; border:1px solid #ddd; border-radius:24px; font-size:16px; outline:none; }
input:focus { border-color:#e20613; }
button[type="submit"] { padding:12px 24px; background:#e20613; color:white; border:none; border-radius:24px; font-weight:bold; cursor:pointer; }
button[type="submit"]:hover { background:#c00510; }
</style>
</head>
<body>
<div class="container">
  <h1>Libby – Agenda Austria 🧠</h1>
  <div id="chat"></div>
  <form onsubmit="send(event)">
    <input type="text" id="msg" placeholder="Deine Frage..." autofocus required>
    <button type="submit" id="btn">Senden</button>
  </form>
</div>
<script>
const chat=document.getElementById('chat'),msg=document.getElementById('msg'),btn=document.getElementById('btn'),sessionId='user_'+Date.now();
function add(text,isUser,conversationId){const wrapper=document.createElement('div');wrapper.className='msg-wrapper'+(isUser?' user':'');const p=document.createElement('div');p.className='msg '+(isUser?'user':'bot');p.textContent=text;wrapper.appendChild(p);if(!isUser&&conversationId){const feedback=document.createElement('div');feedback.className='feedback';feedback.innerHTML=`<button onclick="giveFeedback(${conversationId},1,this)" title="Gute Antwort">👍</button><button onclick="giveFeedback(${conversationId},-1,this)" title="Schlechte Antwort">👎</button>`;wrapper.appendChild(feedback)}chat.appendChild(wrapper);chat.scrollTop=chat.scrollHeight}
function showTyping(){const wrapper=document.createElement('div');wrapper.id='typing-indicator';wrapper.className='msg-wrapper';wrapper.innerHTML='<div class="msg bot typing"><span></span><span></span><span></span></div>';chat.appendChild(wrapper);chat.scrollTop=chat.scrollHeight}
async function send(e){e.preventDefault();const text=msg.value.trim();if(!text)return;add('Du: '+text,true);msg.value='';btn.disabled=true;showTyping();try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,sessionId})});const data=await res.json();document.getElementById('typing-indicator')?.remove();add('Libby: '+data.message,false,data.conversationId)}catch(err){document.getElementById('typing-indicator')?.remove();add('Libby: Fehler',false)}btn.disabled=false;msg.focus()}
async function giveFeedback(conversationId,feedback,button){await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversationId,feedback})});button.classList.add(feedback>0?'active-good':'active-bad');button.parentElement.querySelectorAll('button').forEach(b=>{if(b!==button)b.disabled=true})}
add('Libby: Hi! Worüber möchtest du sprechen?',false);
</script>
</body>
</html>
